<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Upload E-Prescription</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f9ff;
      color: #333;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .hero-section {
      background: linear-gradient(to right, #ECF6FF, #ECF6FF);
      color: #234A6B;
      padding: 4rem 1rem 2rem;
      text-align: center;
      flex-shrink: 0;
    }

    .hero-section h1 {
      font-weight: 700;
      font-size: 2.4rem;
      margin-bottom: 10px;
    }

    .hero-section span {
      color: #3F5DD8;
    }

    .content-wrapper {
      max-width: 550px;
      margin: -40px auto 3rem;
      padding: 3rem 2rem;
      background-color: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      flex-grow: 1;
    }

    .form-label {
      font-weight: 500;
      margin-bottom: 6px;
      color: #234A6B;
    }

    .form-field, .form-textarea {
      background-color: #eef4ff;
      border: 1px solid #d0e0f0;
      border-radius: 10px;
      padding: 12px 14px;
      width: 100%;
      font-size: 1rem;
      color: #333;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .form-field:focus, .form-textarea:focus {
      border-color: #3F5DD8;
      box-shadow: 0 0 0 0.2rem rgba(63, 93, 216, 0.25);
      outline: none;
    }

    .form-textarea {
      resize: vertical;
      height: 130px;
    }

    .upload-button {
      background-color: #4a63f5;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px;
      width: 100%;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }

    .upload-button:hover {
      background-color: #3c5baf;
      transform: translateY(-2px);
    }

    .back-home-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
    }

    .back-home-btn button {
      background-color: #3498db;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      transition: background-color 0.3s ease, transform 0.2s ease;
    }

    .back-home-btn button:hover {
      background-color: #2a7cad;
      transform: translateY(-2px);
    }

    .footer {
      text-align: center;
      font-size: 0.85rem;
      color: #777;
      padding: 2rem 1rem;
      margin-top: auto;
    }

    @media (max-width: 576px) {
      .hero-section h1 {
        font-size: 1.7rem;
      }

      .content-wrapper {
        padding: 2rem 1.5rem;
        margin: -30px auto 2rem;
      }

      .back-home-btn {
        top: 10px;
        right: 10px;
      }

      .back-home-btn button {
        padding: 8px 12px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>

  <div class="back-home-btn">
    <a href="/homewithout">
      <button>
        <i class="bi bi-house-fill"></i> Home
      </button>
    </a>
  </div>

  <div class="hero-section">
    <h1>Upload <span>E-Prescription</span></h1>
    <p class="text-muted" style="font-size: 1rem;">Fill in the details and upload your e-prescription easily.</p>
  </div>

  <div class="content-wrapper">
    <form>
      <div class="mb-3">
        <label class="form-label" for="patientName">Patient's Name</label>
        <input type="text" class="form-field" id="patientName" placeholder="e.g. John Doe">
      </div>

      <div class="mb-3">
        <label class="form-label" for="hospitalName">Hospital Name</label>
        <input type="text" class="form-field" id="hospitalName" placeholder="e.g. Sunrise Hospital">
      </div>

      <div class="mb-3">
        <label class="form-label" for="visitDate">Date of Visit</label>
        <input type="date" class="form-field" id="visitDate">
      </div>

      <div class="mb-3">
        <label class="form-label" for="diagnosis">Diagnosis</label>
        <input type="text" class="form-field" id="diagnosis" placeholder="e.g. Flu, Diabetes...">
      </div>

      <div class="mb-4">
        <label class="form-label" for="prescriptionDetails">E-Prescription</label>
        <textarea class="form-textarea" id="prescriptionDetails" placeholder="Type or paste prescription here..."></textarea>
      </div>

      <button type="submit" class="upload-button">Upload Prescription</button>
    </form>
  </div>

  <div class="footer">
    © 2025 QueCare. All rights reserved.
  </div>

</body>
</html>
